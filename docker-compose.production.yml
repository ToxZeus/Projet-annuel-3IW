services:
  php:
    build: .
    restart: unless-stopped
    volumes:
      - .:/var/www/budgie
    networks:
      - budgie

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/budgie
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - php
    networks:
      - budgie

networks:
  budgie:
    driver: bridge
