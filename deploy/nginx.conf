server {
    listen 80;
    server_name budgie.software www.budgie.software;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name budgie.software www.budgie.software;

    ssl_certificate /etc/letsencrypt/live/budgie.software/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/budgie.software/privkey.pem;

    root /var/www/budgie/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
